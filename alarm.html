<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时报警 - 桐乡水务</title>
    <style>
        :root {
            --bg-primary: #0f0f23; --bg-secondary: #1a1a3e; --bg-card: rgba(255,255,255,0.03);
            --bg-nav: rgba(255,255,255,0.05); --border-color: rgba(255,255,255,0.08);
            --text-primary: #fff; --text-secondary: #888; --text-muted: #666;
            --accent-blue: #00d4ff; --accent-green: #00ff88; --accent-yellow: #ffaa00;
            --accent-red: #ff4757; --accent-purple: #8a2be2;
        }
        [data-theme="light"] {
            --bg-primary: #f5f7fa; --bg-secondary: #ffffff; --bg-card: rgba(255,255,255,0.9);
            --bg-nav: rgba(255,255,255,0.95); --border-color: rgba(0,0,0,0.08);
            --text-primary: #1a1a2e; --text-secondary: #666; --text-muted: #999;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
            min-height: 100vh; color: var(--text-primary); transition: all 0.3s ease;
        }
        .nav {
            background: var(--bg-nav); backdrop-filter: blur(10px); padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-brand { font-size: 20px; font-weight: 700; color: var(--accent-blue); }
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; padding: 8px 16px; border-radius: 20px; transition: all 0.3s; font-size: 14px; }
        .nav-links a:hover, .nav-links a.active { background: rgba(0,212,255,0.15); color: var(--accent-blue); }
        .theme-toggle {
            padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--bg-card); color: var(--text-primary); cursor: pointer;
            font-size: 18px; transition: all 0.3s;
        }
        .theme-toggle:hover { background: rgba(0,212,255,0.15); }
        .container { padding: 30px 40px; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 28px; font-weight: 600; color: var(--text-primary); margin-bottom: 10px; }
        .header p { color: var(--text-secondary); }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--bg-card); border-radius: 14px; padding: 20px;
            border: 1px solid var(--border-color); text-align: center;
        }
        .stat-value { font-size: 36px; font-weight: 700; margin-bottom: 5px; }
        .stat-value.red { color: var(--accent-red); }
        .stat-value.yellow { color: var(--accent-yellow); }
        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.green { color: var(--accent-green); }
        .stat-label { font-size: 13px; color: var(--text-secondary); }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab {
            padding: 10px 20px; border-radius: 8px; cursor: pointer;
            background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-secondary); transition: all 0.3s; font-size: 14px;
        }
        .tab:hover { background: rgba(255,255,255,0.05); }
        .tab.active { background: rgba(0,212,255,0.15); color: var(--accent-blue); border-color: rgba(0,212,255,0.3); }
        .section { display: none; }
        .section.active { display: block; }
        .alarm-list { display: flex; flex-direction: column; gap: 15px; }
        .alarm-item {
            background: var(--bg-card); border-radius: 12px; padding: 20px;
            border-left: 4px solid var(--accent-red); display: flex; gap: 20px; align-items: flex-start;
        }
        .alarm-item.warning { border-left-color: var(--accent-yellow); }
        .alarm-item.info { border-left-color: var(--accent-blue); }
        .alarm-icon { font-size: 28px; }
        .alarm-content { flex: 1; }
        .alarm-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--text-primary); }
        .alarm-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.6; }
        .alarm-meta { display: flex; gap: 20px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
        .alarm-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .alarm-badge.critical { background: rgba(255,71,87,0.15); color: var(--accent-red); }
        .alarm-badge.major { background: rgba(255,170,0,0.15); color: var(--accent-yellow); }
        .alarm-badge.minor { background: rgba(0,212,255,0.15); color: var(--accent-blue); }
        .footer { text-align: center; padding: 25px; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border-color); margin-top: 40px; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="nav-brand">💧 桐乡水务</div>
        <div class="nav-links">
            <a href="index.html">总览</a>
            <a href="realtime.html">实时监测</a>
            <a href="alarm.html" class="active">实时报警</a>
            <a href="data-management.html">资产管理</a>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🚨 实时报警</h1>
            <p>设备异常告警 · 自动监测 · 及时响应</p>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-value red" id="criticalCount">12</div><div class="stat-label">严重告警</div></div>
            <div class="stat-card"><div class="stat-value yellow" id="majorCount">28</div><div class="stat-label">主要告警</div></div>
            <div class="stat-card"><div class="stat-value blue" id="minorCount">45</div><div class="stat-label">次要告警</div></div>
            <div class="stat-card"><div class="stat-value green" id="resolvedCount">156</div><div class="stat-label">今日已解决</div></div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showSection('all')">全部告警</div>
            <div class="tab" onclick="showSection('critical')">严重告警</div>
            <div class="tab" onclick="showSection('major')">主要告警</div>
            <div class="tab" onclick="showSection('minor')">次要告警</div>
        </div>

        <div class="section active" id="all">
            <div class="alarm-list" id="alarmList"></div>
        </div>
    </div>

    <div class="footer">
        桐乡市水务集团 | 实时报警系统 | 自动刷新中
    </div>

    <script>
        const alarms = [
            { level: 'critical', icon: '🔴', title: '流量仪表离线告警', desc: '梧桐分区流量仪表_26020015 已连续离线超过 2 小时，可能影响该区域流量监测数据完整性。', location: '梧桐分区', device: '流量仪表_26020015', time: '2 分钟前' },
            { level: 'critical', icon: '🔴', title: '压力异常告警', desc: '崇福分区压力监测点压力值持续低于 0.20MPa，可能影响供水稳定性。', location: '崇福分区', device: '压力仪表_26024692', time: '5 分钟前' },
            { level: 'major', icon: '🟡', title: '水质余氯超标', desc: '果园桥水厂出水余氯值为 0.85mg/L，超过标准范围 (0.3-0.8mg/L)。', location: '果园桥水厂', device: '水质分析仪_26024988', time: '8 分钟前' },
            { level: 'major', icon: '🟡', title: '水泵电流异常', desc: '运河取水口 2#水泵运行电流偏高 (105A)，建议检查设备状态。', location: '运河取水口', device: '水泵_26024991', time: '12 分钟前' },
            { level: 'minor', icon: '🔵', title: '流量瞬时波动', desc: '濮院分区流量瞬时值波动超过 15%，可能为正常用水高峰。', location: '濮院分区', device: '流量仪表_26020045', time: '15 分钟前' },
            { level: 'critical', icon: '🔴', title: '水质浊度超标', desc: '西部湿地源水浊度值为 1.2NTU，超过标准范围 (<1.0NTU)。', location: '西部湿地', device: '水质分析仪_26024987', time: '18 分钟前' },
            { level: 'major', icon: '🟡', title: '设备通讯故障', desc: '石门分区压力仪表通讯中断，无法获取实时数据。', location: '石门分区', device: '压力仪表_26024701', time: '25 分钟前' },
            { level: 'minor', icon: '🔵', title: 'pH 值偏低', desc: '同福水厂出水 pH 值为 6.8，略低于标准范围 (7.0-8.5)。', location: '同福水厂', device: '水质分析仪_26024992', time: '30 分钟前' }
        ];

        function renderAlarms(filter = 'all') {
            const list = document.getElementById('alarmList');
            const filtered = filter === 'all' ? alarms : alarms.filter(a => a.level === filter);
            list.innerHTML = filtered.map(alarm => `
                <div class="alarm-item ${alarm.level}">
                    <div class="alarm-icon">${alarm.icon}</div>
                    <div class="alarm-content">
                        <div class="alarm-title">${alarm.title}</div>
                        <div class="alarm-desc">${alarm.desc}</div>
                        <div class="alarm-meta">
                            <span class="alarm-badge ${alarm.level}">${alarm.level === 'critical' ? '严重' : alarm.level === 'major' ? '主要' : '次要'}</span>
                            <span>📍 ${alarm.location}</span>
                            <span>⚙️ ${alarm.device}</span>
                            <span>⏰ ${alarm.time}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.target.classList.add('active');
            renderAlarms(sectionId);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            document.querySelector('.theme-toggle').textContent = newTheme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('theme', newTheme);
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.querySelector('.theme-toggle').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

        renderAlarms();
    </script>
</body>
</html>
